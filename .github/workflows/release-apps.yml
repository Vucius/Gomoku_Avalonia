name: Build & Release Apps

on:
  push:
    tags:
      - '*' # Triggers on any tag push, e.g., v1.0.0, 1.2.3

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install .NET Android Workload
        run: dotnet workload install android --skip-manifest-update

      - name: Restore NuGet Packages
        run: dotnet restore Gomoku_Avalonia.Android/Gomoku_Avalonia.Android.csproj -r android-arm64

      - name: Publish Android App (APK)
        run: |
          dotnet publish Gomoku_Avalonia.Android/Gomoku_Avalonia.Android.csproj \
            -c Release \
            -f net10.0-android \
            -r android-arm64 \
            --no-restore \
            /p:AndroidPackageFormat=apk \
            /p:AcceptAndroidSDKLicenses=True

      - name: Upload APK as Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gomoku-Avalonia-Android-APK
          path: Gomoku_Avalonia.Android/bin/Release/net10.0-android/android-arm64/publish/*.apk
          if-no-files-found: error

  build-windows-desktop:
    name: Build Windows Desktop (${{ matrix.runtime }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - win-x64
          - win-x86

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Publish Windows Desktop Installer
        shell: pwsh
        run: ./packaging/publish-desktop.ps1 -Runtime "${{ matrix.runtime }}" -Version "${{ github.ref_name }}"

      - name: Upload Windows Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gomoku-Avalonia-Windows-Desktop-${{ matrix.runtime }}
          path: artifacts/desktop/*-setup.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-windows-desktop
    permissions:
      contents: write

    steps:
      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.apk
            release-assets/*-setup.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
